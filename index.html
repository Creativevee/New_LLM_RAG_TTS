<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GVS Chatbot</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background: #0d0d0d;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* ─── THREADS SIDEBAR ─── */
        .threads-panel {
            width: 240px;
            min-width: 240px;
            background: #0a0c10;
            border-right: 1px solid #1a1d28;
            display: flex;
            flex-direction: column;
            padding: 16px 12px;
            gap: 12px;
        }

        .threads-panel-title {
            font-size: 11px;
            font-weight: 600;
            color: #3e4258;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            padding: 0 4px;
        }

        #newThreadBtn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 9px 14px;
            background: linear-gradient(135deg, #4f6ef7, #9b59f7);
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        #newThreadBtn:hover { opacity: 0.85; }

        .threads-list {
            list-style: none;
            overflow-y: auto;
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 2px;
            scrollbar-width: thin;
            scrollbar-color: #1e2130 transparent;
        }

        .threads-list::-webkit-scrollbar { width: 4px; }
        .threads-list::-webkit-scrollbar-thumb { background: #1e2130; border-radius: 8px; }

        .threads-list li {
            padding: 9px 12px;
            border-radius: 8px;
            font-size: 13px;
            color: #6b6f85;
            cursor: pointer;
            transition: background 0.15s, color 0.15s;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .threads-list li:hover { background: #13161d; color: #b0b4c8; }

        .threads-list li.active {
            background: #1a1d28;
            color: #e0e2f0;
        }

        /* ─── MAIN PANEL ─── */
        .main-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-width: 0;
            background: #111318;
        }

        /* HEADER */
        .header {
            padding: 16px 24px;
            background: #13161d;
            border-bottom: 1px solid #1a1d28;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-shrink: 0;
        }

        .header-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, #4f6ef7, #9b59f7);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 19px;
            flex-shrink: 0;
        }

        .header-info h1 {
            font-size: 15px;
            font-weight: 600;
            color: #e8eaf0;
        }

        .header-status {
            font-size: 12px;
            color: #4caf50;
            display: flex;
            align-items: center;
            gap: 5px;
            margin-top: 3px;
        }

        .status-dot {
            width: 7px;
            height: 7px;
            background: #4caf50;
            border-radius: 50%;
        }

        /* UPLOAD BAR */
        .upload-bar {
            padding: 10px 20px;
            background: #13161d;
            border-bottom: 1px solid #1a1d28;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-shrink: 0;
        }

        .upload-label {
            font-size: 13px;
            color: #5a5e75;
            white-space: nowrap;
        }

        #fileInput { display: none; }

        .file-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 7px 14px;
            background: #1a1d28;
            color: #8a8ea8;
            border: 1px solid #22263a;
            border-radius: 8px;
            font-size: 13px;
            cursor: pointer;
            transition: background 0.2s;
            white-space: nowrap;
        }

        .file-btn:hover { background: #1e2235; }

        #fileName {
            font-size: 12px;
            color: #4a4e65;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            flex: 1;
            min-width: 0;
        }

        .upload-btn {
            padding: 7px 18px;
            background: linear-gradient(135deg, #4f6ef7, #9b59f7);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: opacity 0.2s;
            white-space: nowrap;
        }

        .upload-btn:hover { opacity: 0.85; }
        .upload-btn:disabled { opacity: 0.4; cursor: not-allowed; }

        /* CHAT BOX */
        .chat-box {
            flex: 1;
            overflow-y: auto;
            padding: 24px 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            scrollbar-width: thin;
            scrollbar-color: #1e2130 transparent;
        }

        .chat-box::-webkit-scrollbar { width: 5px; }
        .chat-box::-webkit-scrollbar-track { background: transparent; }
        .chat-box::-webkit-scrollbar-thumb { background: #1e2130; border-radius: 10px; }

        /* MESSAGE ROWS */
        .msg-row {
            display: flex;
            align-items: flex-end;
            gap: 10px;
        }

        .msg-row.user { flex-direction: row-reverse; }

        .avatar {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            flex-shrink: 0;
        }

        .avatar.bot { background: linear-gradient(135deg, #4f6ef7, #9b59f7); }
        .avatar.user { background: #1e2130; color: #7a7e95; }

        .bubble {
            padding: 12px 16px;
            border-radius: 16px;
            max-width: 72%;
            line-height: 1.65;
            font-size: 14px;
        }

        .bubble.bot {
            background: #1a1d28;
            color: #cdd0e5;
            border-bottom-left-radius: 4px;
            border: 1px solid #1e2130;
        }

        .bubble.user {
            background: linear-gradient(135deg, #4f6ef7, #9b59f7);
            color: #fff;
            border-bottom-right-radius: 4px;
        }

        /* TYPING INDICATOR */
        .typing-row {
            display: flex;
            align-items: flex-end;
            gap: 10px;
        }

        .typing-bubble {
            background: #1a1d28;
            border: 1px solid #1e2130;
            border-radius: 16px;
            border-bottom-left-radius: 4px;
            padding: 13px 18px;
            display: flex;
            gap: 5px;
            align-items: center;
        }

        .dot {
            width: 7px;
            height: 7px;
            background: #5a7af8;
            border-radius: 50%;
            animation: bounce 1.2s infinite;
        }

        .dot:nth-child(2) { animation-delay: 0.2s; }
        .dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: translateY(0); opacity: 0.35; }
            40% { transform: translateY(-7px); opacity: 1; }
        }

        /* AUDIO */
        audio {
            width: 100%;
            margin-top: 10px;
            height: 32px;
            border-radius: 8px;
            filter: invert(1) hue-rotate(180deg) brightness(0.85);
        }

        /* INPUT AREA */
        .input-area {
            padding: 14px 20px;
            background: #13161d;
            border-top: 1px solid #1a1d28;
            display: flex;
            gap: 10px;
            align-items: center;
            flex-shrink: 0;
        }

        .input-area input {
            flex: 1;
            padding: 13px 18px;
            background: #1a1d28;
            border: 1px solid #1e2130;
            border-radius: 12px;
            color: #e0e2f0;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
        }

        .input-area input::placeholder { color: #35394f; }
        .input-area input:focus { border-color: #4f6ef7; }

        .send-btn {
            width: 46px;
            height: 46px;
            background: linear-gradient(135deg, #4f6ef7, #9b59f7);
            border: none;
            border-radius: 12px;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.2s;
            flex-shrink: 0;
        }

        .send-btn:hover { opacity: 0.85; }
        .send-btn:disabled { opacity: 0.4; cursor: not-allowed; }
        .send-btn svg { width: 20px; height: 20px; }
    </style>
</head>
<body>

    <!-- THREADS SIDEBAR -->
    <div class="threads-panel">
        <span class="threads-panel-title">Conversations</span>
        <button id="newThreadBtn" onclick="newThread()">+ New Chat</button>
        <ul id="threads-list" class="threads-list"></ul>
    </div>

    <!-- MAIN CHAT AREA -->
    <div class="main-panel">

        <!-- HEADER -->
        <div class="header">
            <div class="header-avatar">🤖</div>
            <div class="header-info">
                <h1>GVS Chatbot</h1>
                <div class="header-status">
                    <span class="status-dot"></span>
                    Online
                </div>
            </div>
        </div>

        <!-- UPLOAD BAR -->
        <div class="upload-bar">
            <span class="upload-label">📎 Document:</span>
            <label class="file-btn" for="fileInput">📁 Choose File</label>
            <input type="file" id="fileInput" accept=".pdf,.txt,.docx,.csv,.json,.md" onchange="updateFileName()">
            <span id="fileName">No file chosen</span>
            <button class="upload-btn" id="uploadBtn" onclick="uploadFile()">Upload</button>
        </div>

        <!-- CHAT -->
        <div class="chat-box" id="chatBox">
            <div class="msg-row">
                <div class="avatar bot">🤖</div>
                <div class="bubble bot">Hello! I'm your AI assistant. You can upload a document and ask me about it, or just ask me anything.</div>
            </div>
        </div>

        <!-- INPUT -->
        <div class="input-area">
            <input type="text" id="questionInput" placeholder="Type a message..."
                   onkeypress="if(event.key==='Enter')askQuestion()">
            <button class="send-btn" id="sendBtn" onclick="askQuestion()">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                     stroke-linecap="round" stroke-linejoin="round">
                    <line x1="22" y1="2" x2="11" y2="13"></line>
                    <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                </svg>
            </button>
        </div>

    </div>

    <script>
        const chatBox = document.getElementById('chatBox');
        const questionInput = document.getElementById('questionInput');
        const sendBtn = document.getElementById('sendBtn');
        const uploadBtn = document.getElementById('uploadBtn');

        let selected_session_id = 'default';

        function updateFileName() {
            const file = document.getElementById('fileInput').files[0];
            document.getElementById('fileName').textContent = file ? file.name : 'No file chosen';
        }

        async function uploadFile() {
            const file = document.getElementById('fileInput').files[0];
            if (!file) { addMessage('Please select a file first.', 'bot'); return; }
            uploadBtn.disabled = true;
            uploadBtn.textContent = 'Uploading...';
            const formData = new FormData();
            formData.append('file', file);
            try {
                const res = await fetch('/upload', { method: 'POST', body: formData });
                const data = await res.json();
                addMessage(data.message || data.error, 'bot');
            } catch (err) {
                addMessage('Upload failed: ' + err.message, 'bot');
            } finally {
                uploadBtn.disabled = false;
                uploadBtn.textContent = 'Upload';
            }
        }

        async function askQuestion() {
            const question = questionInput.value.trim();
            if (!question) return;
            addMessage(question, 'user');
            questionInput.value = '';
            sendBtn.disabled = true;

            const typingRow = document.createElement('div');
            typingRow.className = 'typing-row';
            typingRow.id = 'typing';
            typingRow.innerHTML = `
                <div class="avatar bot">🤖</div>
                <div class="typing-bubble">
                    <div class="dot"></div><div class="dot"></div><div class="dot"></div>
                </div>`;
            chatBox.appendChild(typingRow);
            chatBox.scrollTop = chatBox.scrollHeight;

            try {
                const formData = new FormData();
                formData.append('question', question);
                formData.append('session_id', selected_session_id);
                const res = await fetch('/chat', { method: 'POST', body: formData });
                const data = await res.json();
                document.getElementById('typing')?.remove();
                addMessage(data.text, 'bot', data.audio);
            } catch (err) {
                document.getElementById('typing')?.remove();
                addMessage('Error: ' + err.message, 'bot');
            } finally {
                sendBtn.disabled = false;
            }
        }

        function addMessage(text, sender, audioUrl = null) {
            const row = document.createElement('div');
            row.className = `msg-row ${sender}`;

            const avatarEl = document.createElement('div');
            avatarEl.className = `avatar ${sender}`;
            avatarEl.textContent = sender === 'bot' ? '🤖' : '👤';

            const bubble = document.createElement('div');
            bubble.className = `bubble ${sender}`;
            bubble.innerHTML = text.replace(/\n/g, '<br>');

            if (audioUrl && sender === 'bot') {
                const audio = document.createElement('audio');
                audio.controls = true;
                audio.src = audioUrl;
                bubble.appendChild(audio);
                setTimeout(() => audio.play().catch(() => {}), 100);
            }

            if (sender === 'bot') {
                row.appendChild(avatarEl);
                row.appendChild(bubble);
            } else {
                row.appendChild(bubble);
                row.appendChild(avatarEl);
            }

            chatBox.appendChild(row);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function updateActiveThread() {
            document.querySelectorAll('.threads-list li').forEach(li => {
                li.classList.toggle('active', li.dataset.id === selected_session_id);
            });
        }

        async function loadThreads() {
            try {
                const res = await fetch('/threads');
                const data = await res.json();
                const list = document.getElementById('threads-list');
                list.innerHTML = data.threads.map(t => `
                    <li data-id="${t.session_id}"
                        onclick="selectThread('${t.session_id}', '${t.title.replace(/'/g, "\\'")}')">
                        ${t.title}
                    </li>
                `).join('');
                updateActiveThread();
            } catch (err) {
                console.error('Failed to load threads:', err);
            }
        }

        async function selectThread(session_id, title = 'Untitled') {
            selected_session_id = session_id;
            updateActiveThread();
            document.getElementById('chatBox').innerHTML = '';
            addMessage(`Loaded conversation: <strong>${title}</strong>`, 'bot');
            try {
                const res = await fetch(`/thread/${session_id}`);
                const data = await res.json();
                if (Array.isArray(data.messages) && data.messages.length > 0) {
                    for (const msg of data.messages) {
                        addMessage(msg.text, msg.role === 'assistant' ? 'bot' : msg.role);
                    }
                } else {
                    addMessage('This is a new thread. Start by asking a question.', 'bot');
                }
            } catch (err) {
                addMessage('Failed to load thread messages.', 'bot');
            }
        }

        async function newThread() {
            const title = prompt('Thread title:', 'New conversation');
            if (!title) return;
            try {
                const res = await fetch('/new_thread', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: `title=${encodeURIComponent(title)}`
                });
                const data = await res.json();
                selected_session_id = data.session_id;
                document.getElementById('chatBox').innerHTML = '';
                await loadThreads();
                addMessage(`Started new conversation: <strong>${data.title}</strong>`, 'bot');
            } catch (err) {
                addMessage('Failed to create new thread.', 'bot');
            }
        }

        document.addEventListener('DOMContentLoaded', loadThreads);
    </script>
</body>
</html>
