<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hexagon Labs Chatbot</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background: #0d0d0d;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 820px;
            height: 100vh;
            display: flex;
            flex-direction: column;
            background: #111318;
        }

        /* HEADER */
        .header {
            padding: 18px 24px;
            background: #15181f;
            border-bottom: 1px solid #1e2130;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .header-avatar {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            background: linear-gradient(135deg, #4f6ef7, #9b59f7);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            flex-shrink: 0;
        }

        .header-info h1 {
            font-size: 16px;
            font-weight: 600;
            color: #e8eaf0;
        }

        .header-info span {
            font-size: 12px;
            color: #4caf50;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .header-info span::before {
            content: '';
            width: 7px;
            height: 7px;
            background: #4caf50;
            border-radius: 50%;
            display: inline-block;
        }

        /* UPLOAD BAR */
        .upload-bar {
            padding: 10px 20px;
            background: #15181f;
            border-bottom: 1px solid #1e2130;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .upload-label {
            font-size: 13px;
            color: #8b8fa8;
            white-space: nowrap;
        }

        .file-input-wrapper {
            position: relative;
            flex: 1;
        }

        #fileInput {
            display: none;
        }

        .file-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 7px 14px;
            background: #1e2130;
            color: #a0a4bb;
            border: 1px solid #2a2e40;
            border-radius: 8px;
            font-size: 13px;
            cursor: pointer;
            transition: background 0.2s;
            white-space: nowrap;
        }

        .file-btn:hover { background: #252840; }

        #fileName {
            font-size: 12px;
            color: #6b6f85;
            margin-left: 4px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            max-width: 160px;
        }

        .upload-btn {
            padding: 7px 18px;
            background: linear-gradient(135deg, #4f6ef7, #9b59f7);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: opacity 0.2s;
            white-space: nowrap;
        }

        .upload-btn:hover { opacity: 0.88; }
        .upload-btn:disabled { opacity: 0.4; cursor: not-allowed; }

        /* CHAT BOX */
        .chat-box {
            flex: 1;
            overflow-y: auto;
            padding: 24px 20px;
            display: flex;
            flex-direction: column;
            gap: 18px;
            scrollbar-width: thin;
            scrollbar-color: #2a2e40 transparent;
        }

        .chat-box::-webkit-scrollbar { width: 5px; }
        .chat-box::-webkit-scrollbar-track { background: transparent; }
        .chat-box::-webkit-scrollbar-thumb { background: #2a2e40; border-radius: 10px; }

        /* MESSAGE ROWS */
        .msg-row {
            display: flex;
            align-items: flex-end;
            gap: 10px;
        }

        .msg-row.user { flex-direction: row-reverse; }

        .avatar {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            flex-shrink: 0;
        }

        .avatar.bot { background: linear-gradient(135deg, #4f6ef7, #9b59f7); }
        .avatar.user { background: #1e2130; }

        .bubble {
            padding: 12px 16px;
            border-radius: 16px;
            max-width: 75%;
            line-height: 1.6;
            font-size: 14.5px;
        }

        .bubble.bot {
            background: #1a1d28;
            color: #d4d7e8;
            border-bottom-left-radius: 4px;
            border: 1px solid #1e2130;
        }

        .bubble.user {
            background: linear-gradient(135deg, #4f6ef7, #9b59f7);
            color: #fff;
            border-bottom-right-radius: 4px;
        }

        /* TYPING INDICATOR */
        .typing-row {
            display: flex;
            align-items: flex-end;
            gap: 10px;
        }

        .typing-bubble {
            background: #1a1d28;
            border: 1px solid #1e2130;
            border-radius: 16px;
            border-bottom-left-radius: 4px;
            padding: 12px 18px;
            display: flex;
            gap: 5px;
            align-items: center;
        }

        .dot {
            width: 7px;
            height: 7px;
            background: #4f6ef7;
            border-radius: 50%;
            animation: bounce 1.2s infinite;
        }

        .dot:nth-child(2) { animation-delay: 0.2s; }
        .dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
            40% { transform: translateY(-6px); opacity: 1; }
        }

        /* AUDIO */
        audio {
            width: 100%;
            margin-top: 10px;
            height: 32px;
            border-radius: 8px;
            filter: invert(1) hue-rotate(180deg) brightness(0.85);
        }

        /* INPUT AREA */
        .input-area {
            padding: 16px 20px;
            background: #15181f;
            border-top: 1px solid #1e2130;
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .input-area input {
            flex: 1;
            padding: 13px 18px;
            background: #1a1d28;
            border: 1px solid #1e2130;
            border-radius: 12px;
            color: #e0e2f0;
            font-size: 14.5px;
            outline: none;
            transition: border-color 0.2s;
        }

        .input-area input::placeholder { color: #4a4e65; }
        .input-area input:focus { border-color: #4f6ef7; }

        .send-btn {
            width: 46px;
            height: 46px;
            background: linear-gradient(135deg, #4f6ef7, #9b59f7);
            border: none;
            border-radius: 12px;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.2s;
            flex-shrink: 0;
        }

        .send-btn:hover { opacity: 0.88; }
        .send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

        .send-btn svg { width: 20px; height: 20px; }
    </style>
</head>
<body>
    <div class="container">

        <!-- HEADER -->
        <div class="header">
            <div class="header-avatar">🤖</div>
            <div class="header-info">
                <h1>Hexagon Labs Chatbot</h1>
                <span>Online</span>
            </div>
        </div>

        <!-- UPLOAD BAR -->
        <div class="upload-bar">
            <span class="upload-label">📎 Document:</span>
            <label class="file-btn" for="fileInput">
                📁 Choose File
            </label>
            <input type="file" id="fileInput" accept=".pdf,.txt,.docx,.csv,.json,.md" onchange="updateFileName()">
            <span id="fileName">No file chosen</span>
            <button class="upload-btn" id="uploadBtn" onclick="uploadFile()">Upload</button>
        </div>

        <!-- CHAT -->
        <div class="chat-box" id="chatBox">
            <div class="msg-row">
                <div class="avatar bot">🤖</div>
                <div class="bubble bot">Hello! I'm your AI assistant. You can upload a document and ask me about it, or just ask me anything.</div>
            </div>
        </div>

        <!-- INPUT -->
        <div class="input-area">
            <input type="text" id="questionInput" placeholder="Type a message..." onkeypress="if(event.key==='Enter')askQuestion()">
            <button class="send-btn" id="sendBtn" onclick="askQuestion()">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="22" y1="2" x2="11" y2="13"></line>
                    <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                </svg>
            </button>
        </div>
    </div>

    <script>
        const chatBox = document.getElementById('chatBox');
        const questionInput = document.getElementById('questionInput');
        const sendBtn = document.getElementById('sendBtn');
        const uploadBtn = document.getElementById('uploadBtn');

        function updateFileName() {
            const file = document.getElementById('fileInput').files[0];
            document.getElementById('fileName').textContent = file ? file.name : 'No file chosen';
        }

        async function uploadFile() {
            const file = document.getElementById('fileInput').files[0];
            if (!file) { addMessage('Please select a file first.', 'bot'); return; }

            uploadBtn.disabled = true;
            uploadBtn.textContent = 'Uploading...';

            const formData = new FormData();
            formData.append('file', file);

            try {
                const res = await fetch('/upload', { method: 'POST', body: formData });
                const data = await res.json();
                addMessage(data.message || data.error, 'bot');
            } catch (err) {
                addMessage('Upload failed: ' + err.message, 'bot');
            } finally {
                uploadBtn.disabled = false;
                uploadBtn.textContent = 'Upload';
            }
        }

        async function askQuestion() {
            const question = questionInput.value.trim();
            if (!question) return;

            addMessage(question, 'user');
            questionInput.value = '';
            sendBtn.disabled = true;

            // Typing indicator
            const typingRow = document.createElement('div');
            typingRow.className = 'typing-row';
            typingRow.id = 'typing';
            typingRow.innerHTML = `
                <div class="avatar bot">🤖</div>
                <div class="typing-bubble">
                    <div class="dot"></div>
                    <div class="dot"></div>
                    <div class="dot"></div>
                </div>`;
            chatBox.appendChild(typingRow);
            chatBox.scrollTop = chatBox.scrollHeight;

            try {
                const formData = new FormData();
                formData.append('question', question);

                const res = await fetch('/chat', { method: 'POST', body: formData });
                const data = await res.json();

                document.getElementById('typing')?.remove();
                addMessage(data.text, 'bot', data.audio);

            } catch (err) {
                document.getElementById('typing')?.remove();
                addMessage('Error: ' + err.message, 'bot');
            } finally {
                sendBtn.disabled = false;
            }
        }

        function addMessage(text, sender, audioUrl = null) {
            const row = document.createElement('div');
            row.className = `msg-row ${sender}`;

            const avatarIcon = sender === 'bot' ? '🤖' : '👤';
            const avatar = `<div class="avatar ${sender}">${avatarIcon}</div>`;

            const bubble = document.createElement('div');
            bubble.className = `bubble ${sender}`;
            bubble.innerHTML = text.replace(/\n/g, '<br>');

            if (audioUrl && sender === 'bot') {
                const audio = document.createElement('audio');
                audio.controls = true;
                audio.src = audioUrl;
                bubble.appendChild(audio);
                setTimeout(() => audio.play().catch(() => {}), 100);
            }

            if (sender === 'bot') {
                row.innerHTML = avatar;
                row.appendChild(bubble);
            } else {
                row.appendChild(bubble);
                row.innerHTML += avatar;
            }

            chatBox.appendChild(row);
            chatBox.scrollTop = chatBox.scrollHeight;
        }
    </script>
</body>
</html>
