<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LLM TTS Project</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="logo">
            <svg width="60" height="60" viewBox="0 0 100 100">
                <polygon points="50,5 95,27.5 95,72.5 50,95 5,72.5 5,27.5" fill="#00ffc8"/>
                <polygon points="50,25 75,37.5 75,62.5 50,75 25,62.5 25,37.5" fill="#1e1e1e"/>
                <circle cx="50" cy="50" r="10" fill="#00ffc8"/>
            </svg>
        </div>
        
        <h1>Ask a Question</h1>
        
        <div class="input-section">
            <input type="text" id="questionInput" placeholder="Type your question...">
            <button onclick="askQuestion()">Ask</button>
        </div>
        
        <div id="loading" class="hidden">Loading...</div>
        
        <div id="result" class="hidden">
            <div class="answer-box">
                <h3>Answer:</h3>
                <p id="answerText"></p>
            </div>
            <button onclick="playAudio()" class="audio-btn">🔊 Play Audio</button>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
